<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Shaheem - Social Media</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Add video background here too -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="./cyber-bg.mp4" type="video/mp4">
        </video>
        <div class="fallback-bg"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- Navigation -->
    <nav>
        <div class="container nav-container">
            <h1 class="logo-text">S<span>HAHEEM</span></h1>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
            </ul>
        </div>
    </nav>

    <!-- Social Media Section -->
    <section class="social-media">
        <div class="container">
            <h1 class="animate-text">Connect With Me</h1>
            <p class="animate-text-delay">Let's stay connected through social media</p>
            
            <div class="social-grid">
                <a href="https://instagram.com/shaheeem.me" target="_blank" class="social-card instagram">
                    <i class="fab fa-instagram"></i>
                    <h3>Instagram</h3>
                    <p>Follow my cybersecurity journey</p>
                </a>

                <a href="https://linkedin.com/in/m-shaheem-pentester" target="_blank" class="social-card linkedin">
                    <i class="fab fa-linkedin"></i>
                    <h3>LinkedIn</h3>
                    <p>Professional connections</p>
                </a>

                <a href="https://facebook.com/shaheem.ullattil.7" target="_blank" class="social-card facebook">
                    <i class="fab fa-facebook"></i>
                    <h3>Facebook</h3>
                    <p>Stay updated with my work</p>
                </a>

                <a href="https://x.com/shaheem_shalu" target="_blank" class="social-card twitter">
                    <i class="fab fa-x-twitter"></i>
                    <h3>X (Twitter)</h3>
                    <p>Latest cybersecurity insights</p>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Shaheem. All rights reserved.</p>
        </div>
    </footer>
